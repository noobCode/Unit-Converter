<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
                
        <div id="upper-blue">
            <h2 id="title-text">Metric/Imperial Unit Conversion</h1>
            <div id="upper-box">
                <input type="number" id="input-number">
                <button id="convert-btn">Convert</button>
            </div>
        </div>
        
        <div id="lower-grey">
                <div class="output">
                    <h4>Length (Meter/Feet)</h4>
                    <p id="length" >meters ➞ feet | feet ➞ meters</p>
                </div>
                <div class="output">
                    <h4>Volume (Liters/Gallons)</h4>
                    <p id="volume" >litres ➞ gallons | gallons ➞ litres</p>
                </div>
                <div class="output">
                    <h4>Mass (Kilograms/Pounds)</h4>
                    <p id="mass" >kilos ➞ pounds | pounds ➞ kilos</p>
                </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
